<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoE Build Pricer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-base: #0a0c10;
            --bg-card: rgba(20, 24, 31, 0.8);
            --bg-card-hover: rgba(30, 36, 46, 0.9);
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent-gold: #c8aa6e;
            --border-color: #2e3340;
            --glow-color: rgba(200, 170, 110, 0.2);
            --slot-size: 100px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at center, #1a1f26 0%, #0a0c10 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--accent-gold);
            text-shadow: 0 0 15px var(--glow-color);
            margin-bottom: 0.5rem;
        }

        /* Inventory Layout */
        .inventory-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            max-width: 1000px;
            width: 100%;
        }

        .equipment-grid {
            display: grid;
            grid-template-areas:
                "weapon1 . head amulet offhand"
                "weapon1 . body . offhand"
                "gloves ring1 body ring2 boots"
                ". . belt . .";
            grid-template-columns: repeat(5, 200px);
            grid-template-rows: auto;
            gap: 12px;
            justify-content: center;
        }

        .flasks-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 2rem;
        }

        /* Slot Styles */
        .slot {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .slot:hover {
            border-color: var(--accent-gold);
            background: var(--bg-card-hover);
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(0, 0, 0, 0.3);
        }

        .slot-label {
            position: absolute;
            top: 5px;
            left: 7px;
            font-size: 9px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
        }

        .slot-content {
            padding: 20px 8px 8px 8px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .item-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Prices in Slots */
        .prices {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-top: auto;
        }

        .price-line {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }

        .p-label {
            color: var(--text-secondary);
            font-size: 8px;
            font-weight: 600;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .p-value {
            color: var(--accent-gold);
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .currency-icon {
            width: 13px;
            height: 13px;
            object-fit: contain;
        }

        /* Slots */
        .slot[data-slot="weapon1"],
        .slot[data-slot="offhand"] {
            height: 412px;
            grid-row: span 2;
        }

        .slot[data-slot="weapon1"] {
            grid-area: weapon1;
        }

        .slot[data-slot="offhand"] {
            grid-area: offhand;
        }

        .slot[data-slot="head"] {
            grid-area: head;
            height: 200px;
        }

        .slot[data-slot="body"] {
            grid-area: body;
            height: 412px;
            grid-row: span 2;
        }

        .slot[data-slot="gloves"] {
            grid-area: gloves;
            height: 200px;
        }

        .slot[data-slot="boots"] {
            grid-area: boots;
            height: 200px;
        }

        .slot[data-slot="ring1"] {
            grid-area: ring1;
            height: 200px;
        }

        .slot[data-slot="ring2"] {
            grid-area: ring2;
            height: 200px;
        }

        .slot[data-slot="amulet"] {
            grid-area: amulet;
            height: 200px;
        }

        .slot[data-slot="belt"] {
            grid-area: belt;
            height: 200px;
        }

        .flask-slot {
            width: 100px;
            height: 160px;
        }

        /* Empty State */
        .slot.empty {
            justify-content: center;
            align-items: center;
            border-style: dashed;
            opacity: 0.6;
        }

        .slot.empty:hover {
            opacity: 1;
        }

        .plus {
            font-size: 24px;
            color: var(--text-secondary);
        }

        /* Edit Button */
        .edit-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 2;
        }

        .slot:hover .edit-btn {
            opacity: 0.8;
        }

        .edit-btn:hover {
            color: var(--accent-gold);
        }

        /* Form Overlay */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .edit-form {
            background: #181b21;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--accent-gold);
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .edit-form h2 {
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .edit-form input {
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: #fff;
            padding: 10px;
            font-family: inherit;
        }

        .edit-form input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
        }

        .btn-save {
            background: var(--accent-gold);
            color: #000;
        }

        .btn-cancel {
            background: #333;
            color: #fff;
        }

        .btn-delete {
            background: #721c24;
            color: #fff;
            flex: 0 0 50px;
        }

        @media (max-width: 700px) {
            .equipment-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-areas: none;
                display: flex;
                flex-direction: column;
            }

            .slot {
                height: auto !important;
                min-height: 80px;
            }
        }
    </style>
</head>

<body>

    <header class="header">
        <h1>Build Pricer</h1>
        <p>Нажми на ячейку для поиска, на карандаш для правки</p>
    </header>

    <div class="inventory-wrapper">
        <div class="equipment-grid" id="eq-grid">
            <!-- Slots will be here -->
        </div>
        <div class="flasks-row" id="flasks-row">
            <!-- Flasks will be here -->
        </div>
    </div>

    <div id="modal-container"></div>

    <script>
        const SLOTS = [
            { id: 'weapon1', label: 'Main Hand' },
            { id: 'head', label: 'Helmet' },
            { id: 'offhand', label: 'Offhand' },
            { id: 'body', label: 'Body Armour' },
            { id: 'gloves', label: 'Gloves' },
            { id: 'boots', label: 'Boots' },
            { id: 'ring1', label: 'Ring 1' },
            { id: 'belt', label: 'Belt' },
            { id: 'ring2', label: 'Ring 2' },
            { id: 'amulet', label: 'Amulet' }
        ];

        const FLASK_SLOTS = ['flask1', 'flask2', 'flask3', 'flask4', 'flask5'];

        let items = JSON.parse(localStorage.getItem('poe_pricer_items_visual')) || {};

        const eqGrid = document.getElementById('eq-grid');
        const flasksRow = document.getElementById('flasks-row');
        const modalContainer = document.getElementById('modal-container');

        const editIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
        const currencyIcon = `<img src="https://web.poecdn.com/image/Art/2DItems/Currency/CurrencyModValues.png" class="currency-icon">`;

        function render() {
            eqGrid.innerHTML = '';
            flasksRow.innerHTML = '';

            SLOTS.forEach(slot => {
                eqGrid.appendChild(createSlot(slot.id, slot.label));
            });

            FLASK_SLOTS.forEach((id, index) => {
                flasksRow.appendChild(createSlot(id, `F${index + 1}`, true));
            });
        }

        function createSlot(id, label, isFlask = false) {
            const item = items[id];
            const slotEl = document.createElement(item ? 'a' : 'div');
            slotEl.className = `slot ${!item ? 'empty' : ''} ${isFlask ? 'flask-slot' : ''}`;
            if (item) {
                slotEl.href = item.link || '#';
                slotEl.target = '_blank';
            } else {
                slotEl.onclick = () => showEdit(id);
            }
            slotEl.setAttribute('data-slot', id);

            let content = `<span class="slot-label">${label}</span>`;

            if (item) {
                content += `
                    <button class="edit-btn" onclick="event.preventDefault(); event.stopPropagation(); showEdit('${id}')">${editIcon}</button>
                    <div class="slot-content">
                        <div class="item-name">${item.name}</div>
                        <div class="prices">
                            ${renderPrice('MIN', item.min)}
                            ${renderPrice('GOOD', item.good)}
                            ${renderPrice('PERF', item.perfect)}
                        </div>
                    </div>
                `;
            } else {
                content += `<span class="plus">+</span>`;
            }

            slotEl.innerHTML = content;
            return slotEl;
        }

        function renderPrice(label, value) {
            if (!value && value !== "0") return '';
            return `<div class="price-line"><span class="p-label">${label}</span><span class="p-value">${value} ${currencyIcon}</span></div>`;
        }

        function showEdit(id) {
            const item = items[id] || { name: '', min: '', good: '', perfect: '', link: '' };
            modalContainer.innerHTML = `
                <div class="modal">
                    <div class="edit-form">
                        <h2>${id.toUpperCase()}</h2>
                        <input type="text" id="fm-name" placeholder="Название предмета" value="${item.name}" autofocus>
                        <input type="text" id="fm-min" placeholder="Min цена" value="${item.min}">
                        <input type="text" id="fm-good" placeholder="Good цена" value="${item.good}">
                        <input type="text" id="fm-perf" placeholder="Perfect цена" value="${item.perfect}">
                        <input type="text" id="fm-link" placeholder="Ссылка на трейд" value="${item.link}">
                        <div class="actions">
                            ${items[id] ? `<button class="btn btn-delete" onclick="deleteItem('${id}')">🗑</button>` : ''}
                            <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                            <button class="btn btn-save" onclick="saveItem('${id}')">Сохранить</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.saveItem = function (id) {
            items[id] = {
                name: document.getElementById('fm-name').value || 'Unknown Item',
                min: document.getElementById('fm-min').value,
                good: document.getElementById('fm-good').value,
                perfect: document.getElementById('fm-perf').value,
                link: document.getElementById('fm-link').value
            };
            localStorage.setItem('poe_pricer_items_visual', JSON.stringify(items));
            closeModal();
            render();
        };

        window.deleteItem = function (id) {
            delete items[id];
            localStorage.setItem('poe_pricer_items_visual', JSON.stringify(items));
            closeModal();
            render();
        };

        window.closeModal = function () {
            modalContainer.innerHTML = '';
        };

        render();
    </script>
</body>

</html>
